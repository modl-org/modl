name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  # Avoid a full npm build during CI check/test — build.rs will write stubs
  MODL_SKIP_UI_BUILD: "1"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: pytest
        working-directory: python

  docs:
    name: CLI docs freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check README commands match CLI
        run: |
          cargo build --quiet
          LIVE_COMMANDS=$(./target/debug/modl cli-schema 2>/dev/null | jq -r '.commands[].name' | sort)
          README_COMMANDS=$(grep -oP '`modl (\S+)`' README.md | sed 's/`modl //;s/`//' | sort -u)
          # Check if any CLI command is completely missing from README
          MISSING=$(comm -23 <(echo "$LIVE_COMMANDS") <(echo "$README_COMMANDS") || true)
          if [ -n "$MISSING" ]; then
            echo "::warning::README may be stale — these CLI commands are not mentioned: $MISSING"
            echo "Run: scripts/generate-cli-reference.sh"
          fi
